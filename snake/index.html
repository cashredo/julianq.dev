<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ᔕᑎᗩKE GᗩᗰE</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: radial-gradient(ellipse at center, #0d1f06 0%, #060e03 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Fredoka One', cursive;
      user-select: none;
      overflow: hidden;
    }

    h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: 1rem;
      color: #5ecc55;
      letter-spacing: 3px;
      margin-bottom: 16px;
      text-shadow:
        0 0 12px rgba(94,204,85,0.7),
        0 0 30px rgba(94,204,85,0.3),
        3px 3px 0 #1a4a14,
        -1px -1px 0 #1a4a14;
    }

    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 424px;
      margin-bottom: 8px;
      padding: 0 4px;
    }

    .hud span {
      font-size: 1.1rem;
      color: #7de075;
      text-shadow: 0 0 8px rgba(125,224,117,0.4);
      letter-spacing: 1px;
    }

    .hud .best { color: #3d8b37; }

    /* ── board wrapper ── */
    .board-wrap {
      border: 5px solid #3a7a1a;
      border-radius: 10px;
      box-shadow:
        0 0 0 2px #1a4a0a,
        0 0 0 4px #0d2506,
        0 0 40px rgba(58,122,26,0.6),
        0 0 90px rgba(58,122,26,0.2),
        inset 0 0 20px rgba(0,0,0,0.4);
      overflow: hidden;
      position: relative;
      border-radius: 10px;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
    }

    /* ── shake animation ── */
    @keyframes boardShake {
      0%,100% { transform: translate(0,0) rotate(0deg); }
      10%      { transform: translate(-5px,-3px) rotate(-1deg); }
      20%      { transform: translate(5px,3px) rotate(1deg); }
      30%      { transform: translate(-5px,3px) rotate(-0.5deg); }
      40%      { transform: translate(5px,-3px) rotate(0.5deg); }
      50%      { transform: translate(-4px,-4px) rotate(-1deg); }
      60%      { transform: translate(4px,4px) rotate(1deg); }
      70%      { transform: translate(-3px,3px) rotate(0deg); }
      80%      { transform: translate(3px,-2px) rotate(-0.5deg); }
      90%      { transform: translate(-2px,2px) rotate(0.5deg); }
    }
    .shake { animation: boardShake 0.5s ease; }

    #message {
      margin-top: 14px;
      font-size: 1rem;
      color: #4a9e42;
      text-shadow: 0 0 8px rgba(74,158,66,0.4);
      letter-spacing: 1px;
      min-height: 1.4rem;
      text-align: center;
    }

    .controls {
      margin-top: 8px;
      font-size: 0.85rem;
      color: #4a8a42;
      letter-spacing: 1px;
      text-align: center;
    }

    .credit {
      margin-top: 18px;
      font-size: 0.75rem;
      color: #2a4a26;
      letter-spacing: 1px;
    }

    .credit a {
      color: #4a9e42;
      text-decoration: none;
      transition: color 0.2s;
    }
    .credit a:hover { color: #7de075; text-shadow: 0 0 6px rgba(125,224,117,0.5); }

    /* music button */
    #music-btn {
      position: fixed;
      top: 14px;
      right: 14px;
      background: rgba(20,40,10,0.85);
      border: 2px solid #2d5c14;
      border-radius: 8px;
      color: #5ecc55;
      font-family: 'Fredoka One', cursive;
      font-size: 0.85rem;
      padding: 6px 12px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
    }
    #music-btn:hover { background: rgba(40,80,20,0.9); border-color: #5ecc55; }
  </style>
</head>
<body>

  <button id="music-btn">♪ Music: ON</button>

  <h1>ᔕᑎᗩKE GᗩᗰE</h1>

  <div class="hud">
    <span id="score">Score: 0</span>
    <span class="best" id="hiscore">Best: 0</span>
  </div>

  <div class="board-wrap" id="board-wrap">
    <canvas id="game" width="420" height="420"></canvas>
  </div>

  <div id="message">Press any arrow key to start</div>
  <div class="controls">Arrows · Move &nbsp;·&nbsp; R · Restart &nbsp;·&nbsp; Space · Pause</div>

  <div class="credit">
    made by <a href="https://github.com/cashredo/julianq.dev" target="_blank">julian quevedo ↗</a>
  </div>

  <!-- Background music -->
  <audio id="bg-music" loop>
    <source src="no copyright music In Dreamland background music.mp3" type="audio/mpeg">
  </audio>

  <script>
    // ─── canvas setup ─────────────────────────────────────────────
    const canvas  = document.getElementById('game');
    const ctx     = canvas.getContext('2d');
    const wrap    = document.getElementById('board-wrap');
    const scoreEl = document.getElementById('score');
    const hiEl    = document.getElementById('hiscore');
    const msgEl   = document.getElementById('message');
    const bgMusic = document.getElementById('bg-music');
    const musicBtn = document.getElementById('music-btn');

    const BLOCK = 21;
    const COLS  = 20;
    const ROWS  = 20;
    const BASE_SPEED = 145;

    let snake, dir, nextDir, food, score, running;
    let dead = false;
    let paused = false;
    let loopInterval = null;
    let hiScore = parseInt(localStorage.getItem('snakeHi') || '0');
    let musicOn = true;

    // ─── music toggle ─────────────────────────────────────────────
    musicBtn.addEventListener('click', () => {
      musicOn = !musicOn;
      musicOn ? bgMusic.play() : bgMusic.pause();
      musicBtn.textContent = `♪ Music: ${musicOn ? 'ON' : 'OFF'}`;
    });

    // ─── web audio ────────────────────────────────────────────────
    let AC;
    function ac() {
      if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
      return AC;
    }

    function playEat() {
      try {
        const a = ac();
        const o = a.createOscillator();
        const g = a.createGain();
        o.connect(g); g.connect(a.destination);
        o.type = 'sine';
        o.frequency.setValueAtTime(500, a.currentTime);
        o.frequency.exponentialRampToValueAtTime(900, a.currentTime + 0.07);
        g.gain.setValueAtTime(0.35, a.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.14);
        o.start(a.currentTime); o.stop(a.currentTime + 0.14);
      } catch(e) {}
    }

    function playOof() {
      try {
        const a = ac();
        // "oof" — voiced descending formant
        const o  = a.createOscillator();
        const o2 = a.createOscillator();
        const g  = a.createGain();
        const f  = a.createBiquadFilter();
        o.connect(f); o2.connect(f); f.connect(g); g.connect(a.destination);
        o.type  = 'sawtooth';
        o2.type = 'triangle';
        f.type  = 'lowpass';
        f.frequency.setValueAtTime(900, a.currentTime);
        f.frequency.exponentialRampToValueAtTime(180, a.currentTime + 0.38);
        o.frequency.setValueAtTime(220, a.currentTime);
        o.frequency.exponentialRampToValueAtTime(95, a.currentTime + 0.38);
        o2.frequency.setValueAtTime(440, a.currentTime);
        o2.frequency.exponentialRampToValueAtTime(190, a.currentTime + 0.38);
        g.gain.setValueAtTime(0.45, a.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.42);
        o.start(a.currentTime);  o.stop(a.currentTime + 0.42);
        o2.start(a.currentTime); o2.stop(a.currentTime + 0.42);
      } catch(e) {}
    }

    // ─── helpers ──────────────────────────────────────────────────
    function randInt(max) { return Math.floor(Math.random() * max); }

    function spawnFood() {
      do { food = { x: randInt(COLS), y: randInt(ROWS) }; }
      while (snake.some(s => s.x === food.x && s.y === food.y));
    }

    // ─── reset ────────────────────────────────────────────────────
    function resetGame() {
      if (loopInterval) clearInterval(loopInterval);

      snake   = [{ x:12, y:10 }, { x:11, y:10 }, { x:10, y:10 }];
      dir     = { x:1, y:0 };
      nextDir = { x:1, y:0 };
      score   = 0;
      running = false;
      dead    = false;
      paused  = false;

      scoreEl.textContent = 'Score: 0';
      msgEl.textContent   = 'Press any arrow key to start';

      spawnFood();
      drawEverything();

      loopInterval = setInterval(gameLoop, BASE_SPEED);

      // start music on first interaction
      if (musicOn) bgMusic.play().catch(() => {});
    }

    // ─── board ────────────────────────────────────────────────────
    function drawBoard() {
      for (let c = 0; c < COLS; c++) {
        for (let r = 0; r < ROWS; r++) {
          ctx.fillStyle = (c + r) % 2 === 0 ? '#1c3d0a' : '#173208';
          ctx.fillRect(c * BLOCK, r * BLOCK, BLOCK, BLOCK);
        }
      }
    }

    // ─── tomato food ──────────────────────────────────────────────
    function drawTomato(gx, gy) {
      const cx = gx * BLOCK + BLOCK / 2;
      const cy = gy * BLOCK + BLOCK / 2 + 1;
      const r  = BLOCK / 2 - 2;

      // outline
      ctx.fillStyle = '#7a0a08';
      ctx.beginPath();
      ctx.arc(cx, cy, r + 1.5, 0, Math.PI * 2);
      ctx.fill();

      // body
      ctx.fillStyle = '#e8231c';
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();

      // shine
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.beginPath();
      ctx.ellipse(cx - 2.5, cy - 2.5, r * 0.38, r * 0.3, -0.3, 0, Math.PI * 2);
      ctx.fill();

      // stem
      ctx.strokeStyle = '#1b5e20';
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(cx, cy - r);
      ctx.lineTo(cx, cy - r - 4);
      ctx.stroke();

      // leaves
      ctx.fillStyle = '#2e7d32';
      ctx.beginPath(); ctx.ellipse(cx - 3.5, cy - r - 1.5, 4, 1.8, -0.7, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx + 3.5, cy - r - 1.5, 4, 1.8,  0.7, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx,       cy - r - 3.5, 2.5, 1.6,  0,   0, Math.PI * 2); ctx.fill();
    }

    // ─── snake ────────────────────────────────────────────────────

    // selective corner radius — only round corners that face "outward" (no neighbor on that side)
    function segPath(gx, gy, prev, next) {
      const x = gx * BLOCK;
      const y = gy * BLOCK;
      const W = BLOCK;
      const R = 5;

      const connR = prev && prev.x > gx || next && next.x > gx;  // right connected
      const connL = prev && prev.x < gx || next && next.x < gx;  // left connected
      const connD = prev && prev.y > gy || next && next.y > gy;  // down connected
      const connU = prev && prev.y < gy || next && next.y < gy;  // up connected

      const tlr = (!connL && !connU) ? R : 0;
      const trr = (!connR && !connU) ? R : 0;
      const brr = (!connR && !connD) ? R : 0;
      const blr = (!connL && !connD) ? R : 0;

      ctx.beginPath();
      ctx.moveTo(x + tlr, y);
      ctx.lineTo(x + W - trr, y);
      if (trr) ctx.arcTo(x+W, y,   x+W,   y+trr, trr); else ctx.lineTo(x+W, y);
      ctx.lineTo(x + W, y + W - brr);
      if (brr) ctx.arcTo(x+W, y+W, x+W-brr, y+W, brr); else ctx.lineTo(x+W, y+W);
      ctx.lineTo(x + blr, y + W);
      if (blr) ctx.arcTo(x,   y+W, x,   y+W-blr, blr); else ctx.lineTo(x, y+W);
      ctx.lineTo(x, y + tlr);
      if (tlr) ctx.arcTo(x,   y,   x+tlr,  y,    tlr); else ctx.lineTo(x, y);
      ctx.closePath();
    }

    function getBodyColor(i, total) {
      const ratio = i / total;
      const r = Math.floor(220 - ratio * 75);
      return `rgb(${r},0,0)`;
    }

    function drawSnake() {
      const outlineW = 4;

      // ── pass 1: outlines (drawn slightly offset underneath) ──
      ctx.lineJoin = 'round';
      ctx.lineWidth = outlineW;
      ctx.strokeStyle = '#1a0000';

      snake.forEach((seg, i) => {
        const prev = snake[i - 1] || null;
        const next = snake[i + 1] || null;
        segPath(seg.x, seg.y, prev, next);
        ctx.stroke();
      });

      // ── pass 2: fills ──
      snake.forEach((seg, i) => {
        const prev = snake[i - 1] || null;
        const next = snake[i + 1] || null;

        segPath(seg.x, seg.y, prev, next);

        if (i === 0) {
          ctx.fillStyle = '#ff3535';
        } else {
          ctx.fillStyle = getBodyColor(i, snake.length);
        }
        ctx.fill();
      });

      // ── pass 3: head detail (shine + eyes) ──
      const head = snake[0];
      const hx = head.x * BLOCK;
      const hy = head.y * BLOCK;

      // shine
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.beginPath();
      ctx.ellipse(hx + 7, hy + 6, 5, 3.5, -0.4, 0, Math.PI * 2);
      ctx.fill();

      // eyes — follow direction
      const eyeSz = 3.5;
      const eyeGap = 5;
      let e1x, e1y, e2x, e2y;
      const B = BLOCK;
      if      (dir.x === 1)  { e1x=hx+B-7; e1y=hy+4;      e2x=hx+B-7;  e2y=hy+B-4-eyeSz; }
      else if (dir.x === -1) { e1x=hx+3;   e1y=hy+4;      e2x=hx+3;    e2y=hy+B-4-eyeSz; }
      else if (dir.y === 1)  { e1x=hx+4;   e1y=hy+B-7;    e2x=hx+B-4-eyeSz; e2y=hy+B-7; }
      else                   { e1x=hx+4;   e1y=hy+3;      e2x=hx+B-4-eyeSz; e2y=hy+3;   }

      ctx.fillStyle = '#200000';
      ctx.beginPath(); ctx.arc(e1x+eyeSz/2, e1y+eyeSz/2, eyeSz/2+0.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(e2x+eyeSz/2, e2y+eyeSz/2, eyeSz/2+0.5, 0, Math.PI*2); ctx.fill();

      // white glint
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath(); ctx.arc(e1x+eyeSz/2+0.8, e1y+eyeSz/2-0.8, 1, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(e2x+eyeSz/2+0.8, e2y+eyeSz/2-0.8, 1, 0, Math.PI*2); ctx.fill();

      // sombrero
      drawSombrero(head.x, head.y);
    }

    // ─── sombrero ─────────────────────────────────────────────────
    function drawSombrero(gx, gy) {
      const cx = gx * BLOCK + BLOCK / 2;
      const ty = gy * BLOCK;

      ctx.save();

      // crown — behind brim
      ctx.fillStyle = '#1a0000';  // outline
      ctx.beginPath(); ctx.roundRect(cx - 7, ty - 14, 14, 15, 3); ctx.fill();

      ctx.fillStyle = '#b07e0a';  // crown body
      ctx.beginPath(); ctx.roundRect(cx - 6, ty - 13, 12, 14, 3); ctx.fill();

      // crown highlight
      ctx.fillStyle = 'rgba(255,230,80,0.18)';
      ctx.beginPath(); ctx.roundRect(cx - 3, ty - 12, 5, 8, 2); ctx.fill();

      // wide brim outline
      ctx.fillStyle = '#1a0000';
      ctx.beginPath(); ctx.ellipse(cx, ty + 1, BLOCK * 0.93, 5, 0, 0, Math.PI * 2); ctx.fill();

      // brim
      ctx.fillStyle = '#d4a012';
      ctx.beginPath(); ctx.ellipse(cx, ty + 0.5, BLOCK * 0.88, 4.2, 0, 0, Math.PI * 2); ctx.fill();

      // brim shine
      ctx.fillStyle = 'rgba(255,235,120,0.28)';
      ctx.beginPath(); ctx.ellipse(cx - 3, ty - 0.5, BLOCK * 0.52, 2, 0, 0, Math.PI * 2); ctx.fill();

      // red band
      ctx.fillStyle = '#cc1100';
      ctx.beginPath(); ctx.ellipse(cx, ty + 0.5, 6.5, 2.5, 0, 0, Math.PI * 2); ctx.fill();

      // band dots
      ctx.fillStyle = '#ff6040';
      [-3.8, 0, 3.8].forEach(dx => {
        ctx.beginPath(); ctx.arc(cx + dx, ty + 0.5, 1.1, 0, Math.PI * 2); ctx.fill();
      });

      ctx.restore();
    }

    // ─── draw all ─────────────────────────────────────────────────
    function drawEverything() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBoard();
      drawTomato(food.x, food.y);
      drawSnake();
    }

    // ─── game logic ───────────────────────────────────────────────
    function moveSnake() {
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      const hitWall = head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS;
      const hitSelf = snake.some(s => s.x === head.x && s.y === head.y);

      if (hitWall || hitSelf) { gameOver(); return; }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = 'Score: ' + score;
        if (score > hiScore) {
          hiScore = score;
          hiEl.textContent = 'Best: ' + hiScore;
          localStorage.setItem('snakeHi', hiScore);
        }
        if (score % 5 === 0) {
          const ns = Math.max(65, BASE_SPEED - Math.floor(score / 5) * 10);
          clearInterval(loopInterval);
          loopInterval = setInterval(gameLoop, ns);
        }
        playEat();
        spawnFood();
      } else {
        snake.pop();
      }
    }

    function drawPauseOverlay() {
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#5ecc55';
      ctx.font = 'bold 18px "Fredoka One", cursive';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2 - 12);
      ctx.font = '13px "Fredoka One", cursive';
      ctx.fillStyle = '#3d8b37';
      ctx.fillText('press P to continue', canvas.width / 2, canvas.height / 2 + 14);
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
    }

    function togglePause() {
      if (!running || dead) return;
      paused = !paused;
      if (paused) {
        bgMusic.pause();
        drawPauseOverlay();
        msgEl.textContent = 'Paused';
      } else {
        if (musicOn) bgMusic.play().catch(() => {});
        drawEverything();
        msgEl.textContent = '';
      }
    }

    function gameLoop() {
      if (!running || paused) return;
      moveSnake();
      drawEverything();
    }

    function gameOver() {
      running = false;
      playOof();

      // red flash
      ctx.fillStyle = 'rgba(180,0,0,0.2)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // shake the board
      wrap.classList.remove('shake');
      void wrap.offsetWidth; // reflow to restart animation
      wrap.classList.add('shake');
      wrap.addEventListener('animationend', () => wrap.classList.remove('shake'), { once: true });

      dead = true;
      msgEl.textContent = 'Game Over · Press R or any arrow to play again';
    }

    // ─── input ────────────────────────────────────────────────────
    const ARROWS = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'];

    document.addEventListener('keydown', e => {
      if (ARROWS.includes(e.key)) e.preventDefault();

      if (e.key === 'r' || e.key === 'R') { resetGame(); return; }
      if (e.key === ' ') { e.preventDefault(); togglePause(); return; }

      if (!ARROWS.includes(e.key)) return;

      // arrow key pressed — handle dead / fresh-start / running
      if (dead) {
        resetGame();                               // full reset first
        running = true;
        msgEl.textContent = '';
        if (musicOn) bgMusic.play().catch(() => {});
      } else if (!running) {
        running = true;
        msgEl.textContent = '';
        if (musicOn) bgMusic.play().catch(() => {});
      }

      // update direction only when actually running
      if (!running) return;
      if (e.key === 'ArrowRight' && dir.x !== -1) nextDir = { x:1,  y:0  };
      if (e.key === 'ArrowLeft'  && dir.x !==  1) nextDir = { x:-1, y:0  };
      if (e.key === 'ArrowDown'  && dir.y !== -1) nextDir = { x:0,  y:1  };
      if (e.key === 'ArrowUp'    && dir.y !==  1) nextDir = { x:0,  y:-1 };
    });

    // ─── touch / swipe ────────────────────────────────────────────
    let touchStartX = null, touchStartY = null;

    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
      e.preventDefault();
      if (touchStartX === null) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      touchStartX = touchStartY = null;

      // ignore tiny taps
      if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;

      let key;
      if (Math.abs(dx) > Math.abs(dy)) {
        key = dx > 0 ? 'ArrowRight' : 'ArrowLeft';
      } else {
        key = dy > 0 ? 'ArrowDown' : 'ArrowUp';
      }
      document.dispatchEvent(new KeyboardEvent('keydown', { key }));
    }, { passive: false });

    // ─── start ────────────────────────────────────────────────────
    hiEl.textContent = 'Best: ' + hiScore;  // seed from localStorage
    resetGame();
  </script>
</body>
</html>
